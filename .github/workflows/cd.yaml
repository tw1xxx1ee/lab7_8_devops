name: CD — Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI — Build and Push Docker Image"]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to local minikube
    runs-on: [self-hosted, macOS, minikube]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Verify cluster reachable
        run: |
          kubectl cluster-info | head -3
          kubectl get nodes

      - name: Render image tag in manifest
        run: |
          sed -i.bak "s|IMAGE_TAG|sha-${{ steps.sha.outputs.short_sha }}|g" k8s/app-deployment.yaml
          rm -f k8s/app-deployment.yaml.bak
          grep "image:" k8s/app-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/mongo-secret.yaml
          kubectl apply -f k8s/mongo-pvc.yaml
          kubectl apply -f k8s/mongo-deployment.yaml
          kubectl apply -f k8s/app-configmap.yaml
          kubectl apply -f k8s/app-service.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-servicemonitor.yaml
          kubectl apply -f k8s/app-alerts.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/app-deployment --timeout=180s

      - name: Verify pods
        run: |
          kubectl get pods -l app=my-app -o wide
          kubectl get svc

      - name: Smoke check via port-forward
        run: |
          kubectl port-forward svc/app-service 13000:3000 > /tmp/pf-smoke.log 2>&1 &
          PF_PID=$!
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:13000/health)
          kill $PF_PID 2>/dev/null || true
          echo "Health endpoint returned: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi

      - name: Check error rate via Prometheus (auto-rollback if > 5%)
        run: |
          kubectl port-forward -n monitoring svc/prometheus-kube-prometheus-prometheus 19090:9090 > /tmp/pf-prom.log 2>&1 &
          PF_PID=$!
          sleep 5
          QUERY='sum(rate(http_requests_total{status_code=~"5.."}[2m]))/sum(rate(http_requests_total[2m]))'
          RESPONSE=$(curl -sG --data-urlencode "query=$QUERY" http://localhost:19090/api/v1/query)
          kill $PF_PID 2>/dev/null || true
          ERROR_RATE=$(echo "$RESPONSE" | jq -r '.data.result[0].value[1] // "0"')
          echo "Current error rate: $ERROR_RATE"
          BAD=$(awk "BEGIN { print ($ERROR_RATE > 0.05) }")
          if [ "$BAD" = "1" ]; then
            echo "::error::Error rate $ERROR_RATE exceeds 5% — rolling back"
            kubectl rollout undo deployment/app-deployment
            exit 1
          fi
          echo "Error rate OK"
