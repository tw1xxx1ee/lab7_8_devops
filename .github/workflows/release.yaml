name: Release on tag

on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/my-app

jobs:
  release:
    name: Build, push, GitHub Release, Telegram notify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push versioned image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.prod
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          body: |
            Docker image: `${{ env.IMAGE_NAME }}:${{ github.ref_name }}`
            Also tagged as `stable`.

      - name: Notify Telegram
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🚀 *${{ github.repository }}* released *${{ github.ref_name }}*%0A
          Image: \`${{ env.IMAGE_NAME }}:${{ github.ref_name }}\`%0A
          Commit: \`${{ github.sha }}\`"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MSG}"

  deploy-tag:
    name: Deploy versioned image to Kubernetes
    needs: release
    runs-on: [self-hosted, macOS, minikube]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Render image tag
        run: |
          sed -i.bak "s|IMAGE_TAG|${{ github.ref_name }}|g" k8s/app-deployment.yaml
          rm -f k8s/app-deployment.yaml.bak
          grep "image:" k8s/app-deployment.yaml

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: kubectl rollout status deployment/app-deployment --timeout=180s

      - name: Verify
        run: kubectl get pods -l app=my-app
